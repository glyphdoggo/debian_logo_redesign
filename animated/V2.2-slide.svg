    @keyframes dataStream{0%,20%{stroke-dasharray:var(--base-dash);stroke-dashoffset:var(--base-offset)}40%,60%{stroke-dasharray:0 var(--circumference);stroke-dashoffset:calc(var(--base-offset) - (var(--circumference)*var(--speed-mult)*.25))}80%,to{stroke-dasharray:var(--base-dash);stroke-dashoffset:calc(var(--base-offset) - (var(--circumference)*var(--speed-mult)))}}.pulse-track{--circumference:calc(2 * pi * var(--r) * 1px);animation:dataStream 10s cubic-bezier(.8,0,.2,1) infinite;transform-origin:center}.cw-slow{--speed-mult:-2}.cw-fast{--speed-mult:-1}
